<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Confirmation</title>
</head>
<body>

<h2>Booking Confirmation</h2>

<div th:if="${success == true}">
    <p><b>Success!</b> Your appointment was booked.</p>
</div>

<div th:if="${success == false}">
    <p><b>Not booked.</b> That slot is no longer available.</p>
</div>

<p>
    <a href="/">Home</a> |
    <a href="/slots">View Slots</a> |
    <a href="/api/appointments">View Appointments (JSON)</a>
</p>

</body>
</html>
