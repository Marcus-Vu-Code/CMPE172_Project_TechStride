spring.application.name=techstride-scheduler-m3

# --- JDBC (SQLite) ---
# This milestone uses SQLite so the project runs locally with zero external setup.
spring.datasource.url=jdbc:sqlite:./techstride.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Initialize schema + seed data on startup (schema.sql + data.sql)
spring.sql.init.mode=always

# Helpful SQL logging for demos
logging.level.org.springframework.jdbc.core=DEBUG

# Thymeleaf templates
spring.thymeleaf.cache=false
