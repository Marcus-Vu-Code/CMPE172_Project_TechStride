spring.application.name=techstride-scheduler-m5

# --- JDBC (SQLite) ---
spring.datasource.url=jdbc:sqlite:./techstride.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Initialize schema + seed data on startup (schema.sql + data.sql)
spring.sql.init.mode=always

# Helpful SQL logging for demos
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.edu.sjsu.cmpe172.starterdemo=INFO

# Thymeleaf templates
spring.thymeleaf.cache=false

# Mock remote boundary configuration
integration.notification.base-url=http://localhost:8080
